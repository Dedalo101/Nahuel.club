<!-- Commission Form -->
<div class="mt-24 max-w-xl">
    <h3 class="text-xl tracking-tight mb-8">Commission or Collaboration Inquiry</h3>
   
    <form id="art-inquiry-form" action="https://formspree.io/f/mjgzlnwz" method="POST" class="space-y-8">
        <input type="hidden" name="_subject" value="New Art Commission Inquiry from nahuel.club">
        <input type="text" name="_gotcha" class="hidden" tabindex="-1" autocomplete="off">

        <div>
            <label class="block text-xs tracking-[2px] text-white/50 mb-3">NAME</label>
            <input id="art-name" name="name" type="text" class="w-full bg-transparent border-b border-white/20 py-4 text-lg focus:outline-none placeholder:text-white/40" placeholder="Your name" required>
        </div>
        
        <div>
            <label class="block text-xs tracking-[2px] text-white/50 mb-3">EMAIL</label>
            <input id="art-email" name="email" type="email" class="w-full bg-transparent border-b border-white/20 py-4 text-lg focus:outline-none placeholder:text-white/40" placeholder="you@studio.com" required>
        </div>
        
        <div>
            <label class="block text-xs tracking-[2px] text-white/50 mb-3">PROJECT DESCRIPTION</label>
            <textarea id="art-message" name="message" class="w-full bg-transparent border-b border-white/20 py-4 text-lg focus:outline-none placeholder:text-white/40 h-40 resize-y" placeholder="Describe the project, style, size, timeline, and any references..." required></textarea>
        </div>
        
        <div>
            <label class="block text-xs tracking-[2px] text-white/50 mb-3">SUGGESTED PRICE FOR INDIVIDUAL PAINTINGS</label>
            <input id="art-price" name="suggested_price" type="text" class="w-full bg-transparent border-b border-white/20 py-4 text-lg focus:outline-none placeholder:text-white/40" placeholder="€1,200 per piece (or your suggestion)">
            <p class="text-[10px] text-white/40 mt-1.5">Feel free to suggest your price — I’m open to discussion.</p>
        </div>
        
        <div id="art-error" class="hidden text-red-400 text-xs"></div>
        
        <button type="submit" id="art-submit-btn"
                class="group flex items-center gap-x-3 text-sm tracking-[2px] border border-white/30 hover:bg-white hover:text-black transition px-8 py-4 mt-4">
            <span id="art-btn-text">SEND INQUIRY</span>
            <i class="fas fa-arrow-right group-hover:translate-x-1 transition"></i>
        </button>
    </form>
   
    <p class="text-[10px] text-white/40 mt-6">I typically respond within 48 hours.</p>
</div>

<!-- Toast -->
<div id="form-toast">INQUIRY SENT — SPEAK SOON 🙏</div>

<script>
    console.log('%c[Art Page] Script loaded successfully', 'color:#a855f7');

    const artForm = document.getElementById('art-inquiry-form');
    const artSubmitBtn = document.getElementById('art-submit-btn');
    const artBtnText = document.getElementById('art-btn-text');
    const artError = document.getElementById('art-error');
    const toast = document.getElementById('form-toast');

    if (!artForm) {
        console.error('%c[Art Page] ERROR: Form not found!', 'color:red');
    } else {
        artForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('%c[Art Page] Form submit intercepted', 'color:#a855f7');
            
            artError.classList.add('hidden');
            artError.textContent = '';

            const name = document.getElementById('art-name').value.trim();
            const email = document.getElementById('art-email').value.trim();
            const message = document.getElementById('art-message').value.trim();

            if (!name || !email || !message) {
                artError.textContent = 'Please fill in all required fields.';
                artError.classList.remove('hidden');
                return;
            }

            artSubmitBtn.disabled = true;
            artBtnText.innerHTML = 'SENDING... <i class="fa-solid fa-spinner fa-spin ml-2"></i>';

            try {
                const formData = new FormData(artForm);
                const response = await fetch('https://formspree.io/f/mjgzlnwz', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    artForm.reset();
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3800);
                    console.log('%c[Art Page] SUCCESS!', 'color:#22c55e');
                } else {
                    const data = await response.json().catch(() => ({}));
                    artError.textContent = data.error || 'Submission failed.';
                    artError.classList.remove('hidden');
                }
            } catch (err) {
                console.error('[Art Page] Network error:', err);
                artError.textContent = 'Network error. Please try again.';
                artError.classList.remove('hidden');
            } finally {
                artSubmitBtn.disabled = false;
                artBtnText.innerHTML = 'SEND INQUIRY';
            }
        });
    }
</script>
