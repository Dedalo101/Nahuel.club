    <script>
        const originalWarn = console.warn;
        console.warn = (...args) => {
            if (!args[0] || typeof args[0] !== 'string' || !args[0].includes('cdn.tailwindcss.com')) {
                originalWarn.apply(console, args);
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@700&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; background: #050505; }
        .heading-serif { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; letter-spacing: -0.02em; }

        /* === PROMINENT PURPLE ESCHER TESSELLATION (much more visible) === */
        .escher-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: #000;
            overflow: hidden;
        }
        .escher-bg::before {
            content: '';
            position: absolute;
            inset: -250%;
            background-image: 
                /* Purple triangular tessellation */
                linear-gradient(60deg, #4C1D95 22%, transparent 22%) -60px 0,
                linear-gradient(300deg, #4C1D95 22%, transparent 22%) -60px 0,
                linear-gradient(60deg, transparent 78%, #7C3AED 78%) -60px 0,
                linear-gradient(300deg, transparent 78%, #7C3AED 78%) -60px 0,
                /* Purple accent lines */
                linear-gradient(#A78BFA 1.5px, transparent 1.5px),
                linear-gradient(90deg, #A78BFA 1.5px, transparent 1.5px);
            background-size: 95px 165px, 95px 165px, 95px 165px, 95px 165px, 48px 48px, 48px 48px;
            animation: escher-drift 22s linear infinite, escher-pulse 10s ease-in-out infinite;
            opacity: 0.85;
            filter: contrast(1.35);
        }
        .escher-bg::after {
            content: '';
            position: absolute;
            inset: -180%;
            background-image: 
                radial-gradient(circle at 25% 35%, #C4B5FD 1.5px, transparent 4px),
                radial-gradient(circle at 75% 65%, #A78BFA 1px, transparent 3px);
            background-size: 105px 105px, 135px 135px;
            animation: escher-shift 16s ease-in-out infinite alternate;
            opacity: 0.7;
        }

        @keyframes escher-drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(10%, 7%) rotate(0.7deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        @keyframes escher-pulse {
            0%, 100% { opacity: 0.75; }
            50% { opacity: 0.95; }
        }
        @keyframes escher-shift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(14px, -10px); }
        }

        /* Deep fractal layer (kept subtle) */
        .fractal-bg {
            position: fixed;
            inset: 0;
            z-index: -3;
            background: #000;
            overflow: hidden;
        }
        .fractal-bg::before {
            content: '';
            position: absolute;
            inset: -150%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 44px 44px, 44px 44px;
            animation: fractal-drift 24s ease-in-out infinite;
        }
        @keyframes fractal-drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(12%, 9%) rotate(0.6deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .glitch-img {
            filter: contrast(1.25) saturate(1.05);
            transition: filter 0.3s ease;
        }
        .glitch-img:hover {
            animation: glitch-img 0.6s steps(3) infinite;
            filter: contrast(1.5) saturate(1.35) hue-rotate(8deg);
        }
        @keyframes glitch-img {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-1px, 2px); }
            80% { transform: translate(2px, -1px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
