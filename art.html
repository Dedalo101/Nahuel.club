<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FOREVERNESS — Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script>
        // Suppress Tailwind Play CDN warning (safe for GitHub Pages production)
        const originalWarn = console.warn;
        console.warn = (...args) => {
            if (!args[0] || typeof args[0] !== 'string' || !args[0].includes('cdn.tailwindcss.com')) {
                originalWarn.apply(console, args);
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&amp;family=Playfair+Display:wght@700&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; background: #050505; }
        .heading-serif { font-family: 'Playfair Display', Georgia, serif; font-weight: 700; letter-spacing: -0.02em; }
        
        .glitch-img {
            filter: contrast(1.3) saturate(0.9);
            transition: filter 0.3s ease;
        }
        
        .glitch-img:hover {
            animation: glitch-img 0.6s steps(3) infinite;
            filter: contrast(1.6) saturate(1.4) hue-rotate(10deg);
        }
        
        @keyframes glitch-img {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(3px, -2px); }
            60% { transform: translate(-1px, 2px); }
            80% { transform: translate(2px, -1px); }
            100% { transform: translate(0); }
        }
        
        .fractal-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #000;
            overflow: hidden;
        }
        
        .fractal-bg::before {
            content: '';
            position: absolute;
            inset: -150%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px),
                radial-gradient(circle, rgba(167,139,250,0.15) 1px, transparent 3px);
            background-size: 38px 38px, 38px 38px, 22px 22px;
            animation: fractal-drift 9s ease-in-out infinite, grid-shift 18s ease-in-out infinite;
            filter: contrast(1.6);
            will-change: transform, background-position;
        }
        
        @keyframes fractal-drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(18%, 12%) rotate(1.2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        
        @keyframes grid-shift {
            0% { background-position: 0 0, 0 0, 0 0; }
            100% { background-position: 76px 76px, 76px 76px, 44px 44px; }
        }
        
        .glitch {
            animation: glitch 3s infinite linear;
        }
    </style>
</head>
<body class="bg-black text-white">
    <!-- Fractal Background -->
    <div class="fractal-bg"></div>
    
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/90 backdrop-blur-lg border-b border-white/10">
        <div class="max-w-screen-2xl mx-auto px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-8 h-8 rounded-full border border-white/40 flex items-center justify-center">
                    <span class="text-lg font-light tracking-[3px]">F</span>
                </div>
                <a href="index.html" class="font-semibold text-2xl tracking-tight">FOREVERNESS</a>
            </div>
            <a href="index.html" class="text-sm tracking-[1.5px] hover:text-white/70 transition">BACK TO HOME</a>
        </div>
    </nav>
    
    <div class="pt-20 max-w-screen-2xl mx-auto px-8 py-16">
        <div class="max-w-3xl mb-16">
            <h1 class="heading-serif text-7xl tracking-tighter">Art</h1>
        </div>
        
        <!-- Art Grid - Black & White Escher Prints -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="group relative overflow-hidden rounded-2xl aspect-[4/3]">
                <img src="https://picsum.photos/id/1018/800/600" class="w-full h-full object-cover group-hover:scale-105 transition duration-700 glitch-img grayscale-[0.9]" alt="Black and white Escher tessellation">
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 to-transparent flex items-end p-8">
                    <div>
                        <div class="text-xs tracking-[3px] text-white/60">01</div>
                    </div>
                </div>
            </div>
            
            <div class="group relative overflow-hidden rounded-2xl aspect-[4/3]">
                <img src="https://picsum.photos/id/1033/800/600" class="w-full h-full object-cover group-hover:scale-105 transition duration-700 glitch-img grayscale-[0.9]" alt="Black and white Escher tessellation">
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 to-transparent flex items-end p-8">
                    <div>
                        <div class="text-xs tracking-[3px] text-white/60">02</div>
                    </div>
                </div>
            </div>
            
            <div class="group relative overflow-hidden rounded-2xl aspect-[4/3]">
                <img src="https://picsum.photos/id/1041/800/600" class="w-full h-full object-cover group-hover:scale-105 transition duration-700 glitch-img grayscale-[0.9]" alt="Black and white Escher tessellation">
                <div class="absolute inset-0 bg-gradient-to-t from-black/85 to-transparent flex items-end p-8">
                    <div>
                        <div class="text-xs tracking-[3px] text-white/60">03</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Inquiry Form -->
        <div class="mt-24 max-w-xl">
            <h3 class="text-xl tracking-tight mb-8">Commission or Collaboration Inquiry</h3>
            
            <form class="space-y-8">
                <div>
                    <label class="block text-xs tracking-[2px] text-white/50 mb-3">NAME</label>
                    <input type="text" class="w-full bg-transparent border-b border-white/20 py-4 text-lg focus:outline-none placeholder:text-white/40" placeholder="Your name">
                </div>
                <div>
                    <label class="block text-xs tracking-[2px] text-white/50 mb-3">EMAIL</label>
                    <input type="email" class="w-full bg-transparent border-b border-white/20 py-4 text-lg focus:outline-none placeholder:text-white/40" placeholder="you@studio.com">
                </div>
                <div>
                    <label class="block text-xs tracking-[2px] text-white/50 mb-3">PROJECT DESCRIPTION</label>
                    <textarea class="w-full bg-transparent border-b border-white/20 py-4 text-lg focus:outline-none placeholder:text-white/40 h-32 resize-y" placeholder="Describe the project or commission"></textarea>
                </div>
                
                <div>
                    <label class="block text-xs tracking-[2px] text-white/50 mb-1">SUGGESTED PRICE FOR INDIVIDUAL PAINTINGS</label>
                    <div class="text-[10px] text-white/40 mb-2">suggest your price.</div>
                    <input type="text" class="w-full bg-transparent border-b border-white/20 py-4 text-lg focus:outline-none placeholder:text-white/40" placeholder="$800 – $2500">
                </div>
                
                <button type="button" class="px-10 py-4 border border-white/40 hover:bg-white hover:text-black transition text-sm tracking-[2px]">
                    SEND INQUIRY
                </button>
            </form>
        </div>
    </div>
    
    <footer class="border-t border-white/10 py-12 text-center text-xs text-white/50">
        © FOREVERNESS — ALL RIGHTS PRESERVED
    </footer>
</body>
</html>
